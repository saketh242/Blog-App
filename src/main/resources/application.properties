spring.application.name=blogapp

spring.datasource.url=jdbc:postgresql://localhost:5432/blogdb
spring.datasource.username=bloguser
spring.datasource.password=blogpass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=blog-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.acks=all

# Elasticsearch Configuration
spring.elasticsearch.uris=http://localhost:9200
spring.elasticsearch.enabled=true
spring.data.elasticsearch.repositories.enabled=true
spring.data.elasticsearch.auto-index.enabled=false
spring.elasticsearch.client.connectTimeout=5s
spring.elasticsearch.client.socketTimeout=60s
spring.elasticsearch.socket-keep-alive=true
spring.data.elasticsearch.rest.read-timeout=60s
spring.data.elasticsearch.rest.connection-timeout=5s

# Server Configuration
server.port=8080
server.servlet.context-path=/

# JPA & Hibernate Configuration
spring.jpa.open-in-view=false

# Logging
logging.level.org.springframework.data.elasticsearch=DEBUG

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.url=jdbc:postgresql://localhost:5432/blogdb?options=-c%20TimeZone=UTC
